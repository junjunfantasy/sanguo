let tab = 'all';

function setTab(t, btn) {
  tab = t;
  document.querySelectorAll('.quick-filter button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('searchInput').value = '';
  filterAll();
}

function filterAll() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  
  let concepts = CONCEPTS;
  let books = BOOKS;
  
  if (tab === 'book') concepts = [];
  if (tab === 'concept') books = [];
  
  if (q) {
    concepts = concepts.filter(c => c.name.includes(q) || (c.tags||[]).some(t => t.includes(q)));
    books = books.filter(b => b.name.includes(q) || (b.tags||[]).some(t => t.includes(q)));
  }
  
  document.getElementById('conceptGrid').style.display = concepts.length ? '' : 'none';
  document.getElementById('bookGrid').style.display = books.length ? '' : 'none';
  
  document.getElementById('conceptGrid').innerHTML = concepts.map(c => `
    <div class="char-card fade-in" onclick="openDetail('concepts/${c.name}')">
      <div class="char-avatar" style="font-size:20px;">📖</div>
      <div class="char-name">${c.name}</div>
      <div class="char-alias">${c.desc || '—'}</div>
      <div class="char-tags">${(c.tags||[]).map(t => '<span class="char-tag">' + t + '</span>').join('')}</div>
    </div>
  `).join('');
  
  document.getElementById('bookGrid').innerHTML = books.map(b => `
    <div class="char-card fade-in" onclick="openDetail('books/${b.name}')">
      <div class="char-avatar" style="font-size:20px;">📜</div>
      <div class="char-name">${b.name}</div>
      <div class="char-alias">${b.label} · ${b.desc || ''}</div>
      <div class="char-tags">${(b.tags||[]).map(t => '<span class="char-tag">' + t + '</span>').join('')}</div>
    </div>
  `).join('');
}

function openDetail(path) {
  window.location.href = 'wiki/index.html#' + encodeURIComponent(path.replace('concepts/', '').replace('books/', ''));
}

window.onload = filterAll;
</script>
