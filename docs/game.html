    let currentGameFaction = 'all';

    function renderGameChars(list) {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = list.map(c => {
            const hpDots = Array(c.hp || 4).fill(0).map(() => '<span class="hp-dot"></span>').join('');
            const skillHtml = (c.skills || []).map(s => {
                const desc = SKILL_DESC[s] || '暂无技能描述';
                const hist = SKILL_HISTORY[s] || '';
                return `<div class="skill-item">
                    <div class="skill-name">【${s}】</div>
                    <div class="skill-desc">${desc}</div>
                    ${hist ? `<div class="skill-history">📖 ${hist}</div>` : ''}
                </div>`;
            }).join('');
            return `<div class="game-card" data-faction="${c.faction}">
                <div class="game-card-header">
                    <div>
                        <div class="game-card-name">${c.name}</div>
                        <div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">
                            <span class="faction-badge faction-${c.faction}">${c.faction}</span>
                            ${c.alias ? ` · 字${c.alias}` : ''}
                        </div>
                    </div>
                    <div class="game-card-hp">${hpDots}</div>
                </div>
                <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">
                    📅 ${c.birth}年 - ${c.death}年
                </div>
                <div class="game-card-skills">${skillHtml}</div>
            </div>`;
        }).join('');
        document.getElementById('totalGameChars').textContent = list.length;
    }

    function filterGameChars() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = SANGUO_CHARACTERS;
        if (q) {
            filtered = filtered.filter(c => 
                c.name.includes(q) || 
                (c.alias && c.alias.includes(q)) || 
                (c.skills && c.skills.some(s => s.includes(q)))
            );
        }
        if (currentGameFaction !== 'all') filtered = filtered.filter(c => c.faction === currentGameFaction);
        renderGameChars(filtered);
    }

    function filterGameFaction(f) {
        currentGameFaction = f;
        document.getElementById('searchInput').value = '';
        let filtered = f === 'all' ? SANGUO_CHARACTERS : SANGUO_CHARACTERS.filter(c => c.faction === f);
        renderGameChars(filtered);
    }

    window.onload = function() {
        renderGameChars(SANGUO_CHARACTERS);
    };
