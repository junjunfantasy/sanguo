<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国知识库 - Three Kingdoms Knowledge Base</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="data/characters.js"></script>
    <script src="data/events.js"></script>
</head>
<body>
    <div class="header">
        <div class="logo"><span class="logo-icon">🏯</span> 三国知识库</div>
        <nav class="nav">
            <a href="index.html" class="active">首页</a>
            <a href="characters.html">人物谱</a>
            <a href="timeline.html">事件时间线</a>
            <a href="metro.html">事件地铁图</a>
            <a href="graph.html">关系图谱</a>
<a href="game-plus.html">武将图鉴</a>
            <a href="culture.html">文化</a>
        <a href="war.html">争霸</a>
        </nav>
    </div>

    <div class="main">
        <div class="page-title">🏯 三国知识库</div>
        <div class="page-subtitle">基于 Obsidian 笔记的知识管理与可视化平台 · 184年 - 280年 · <strong>100位人物 · 30则典故</strong></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card fade-in">
                <div class="stat-icon">👤</div>
                <div class="stat-number" id="stat-characters">0</div>
                <div class="stat-label">人物</div>
            </div>
            <div class="stat-card fade-in">
                <div class="stat-icon">⚔️</div>
                <div class="stat-number" id="stat-battles">0</div>
                <div class="stat-label">战役</div>
            </div>
            <div class="stat-card fade-in">
                <div class="stat-icon">📜</div>
                <div class="stat-number" id="stat-events">0</div>
                <div class="stat-label">事件</div>
            </div>
            <div class="stat-card fade-in">
                <div class="stat-icon">🃏</div>
                <div class="stat-number" id="stat-skills">0</div>
                <div class="stat-label">三国杀技能</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-section fade-in">
            <div class="viz-title">🔍 知识搜索</div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索人物、事件、地点..." onkeyup="doSearch(event)">
                <button class="search-btn" onclick="doSearch()">搜索</button>
            </div>
            <div class="filter-section">
                <select class="filter-select" id="typeFilter">
                    <option value="all">所有类型</option>
                    <option value="character">人物</option>
                    <option value="event">事件</option>
                </select>
                <select class="filter-select" id="factionFilter">
                    <option value="all">所有势力</option>
                    <option value="魏">魏</option>
                    <option value="蜀">蜀</option>
                    <option value="吴">吴</option>
                    <option value="群">群</option>
                </select>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Charts -->
        <div class="viz-grid">
            <div class="viz-card fade-in">
                <div class="viz-title">📊 势力分布</div>
                <div id="factionChart" class="viz-container"></div>
            </div>
            <div class="viz-card fade-in">
                <div class="viz-title">⚔️ 事件类型分布</div>
                <div id="eventTypeChart" class="viz-container"></div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="timeline-container fade-in">
            <div class="viz-title">📅 历史大事时间线</div>
            <div id="timelineChart" style="height:500px;"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>三国知识库 · 基于 Obsidian 笔记 · <a href="https://github.com/junjunfantasy/sanguo" target="_blank">GitHub</a></p>
            <p style="margin-top:4px;">数据来源于 <strong>sanguo-knowledge</strong> 知识库，共<strong>190+篇笔记 · 30则典故 · 15部文献</strong></p>
        </div>
    </div>

    <script>
    let allSearchData = [];

    function initData() {
        document.getElementById('stat-characters').textContent = '100';
        document.getElementById('stat-battles').textContent = '8';
        document.getElementById('stat-events').textContent = '23';
        document.getElementById('stat-skills').textContent = '28';

        const alts = {'仲达':'司马懿','孟德':'曹操','孔明':'诸葛亮','云长':'关羽','翼德':'张飞','子龙':'赵云','奉先':'吕布','公瑾':'周瑜','子敬':'鲁肃','子明':'吕蒙','伯言':'陆逊','文远':'张辽','元让':'夏侯惇','仲谋':'孙权','玄德':'刘备','士元':'庞统','孝直':'法正','文长':'魏延','伯约':'姜维','幼常':'马谡','文和':'贾诩','奉孝':'郭嘉','公则':'程昱','子桓':'曹丕','子建':'曹植','慈明':'荀彧','妙才':'夏侯渊','子廉':'曹洪','公明':'徐晃','儁乂':'张郃','文则':'于禁','文谦':'乐进','兴霸':'甘宁','公覆':'黄盖','义公':'韩当','德谋':'程普','子义':'太史慈','公绩':'凌统','公台':'陈宫','景升':'刘表','公达':'荀攸','子丹':'曹真','曼成':'李典','宣高':'臧霸','元皓':'田丰','季常':'马良','子瑜':'诸葛瑾','伯恭':'张翼','正方':'李严','元逊':'诸葛恪','幼平':'周泰','承渊':'丁奉','文向':'徐盛','休穆':'朱桓','元叹':'顾雍','子布':'张昭','幼节':'陆抗','子师':'王允','士载':'邓艾','士季':'钟会','叔子':'羊祜','元凯':'杜预','文优':'李儒','公闾':'贾充','遂高':'何进','公琰':'蒋琬','文伟':'费祎','伯喈':'蔡邕','元俭':'廖化','子嶷':'张嶷'};
        allSearchData = [
            ...SANGUO_CHARACTERS.map(c => ({ name: c.name, faction: c.faction, type: 'character', label: '人物', desc: c.desc, keywords: [c.name, c.alias||'', alts[c.name]||''].filter(Boolean) })),
            ...SANGUO_EVENTS.map(e => ({ name: e.name, faction: '', type: 'event', label: '事件', desc: e.desc, keywords: [e.name] }))
        ];
    }

    function initFactionChart() {
        const chart = echarts.init(document.getElementById('factionChart'));
        const count = {};
        SANGUO_CHARACTERS.forEach(c => { count[c.faction] = (count[c.faction] || 0) + 1; });
        const colors = { '魏': '#e74c3c', '蜀': '#2ecc71', '吴': '#3498db', '群': '#f39c12' };
        const data = Object.entries(count).map(([k, v]) => ({ value: v, name: k, itemStyle: { color: colors[k] || '#95a5a6' } }));
        chart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c}人 ({d}%)' },
            legend: { bottom: '5%', textStyle: { color: '#7a7268' } },
            series: [{
                type: 'pie', radius: ['45%', '70%'], center: ['50%', '45%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 6, borderColor: '#faf8f2', borderWidth: 3 },
                label: { show: true, color: '#3a3530', formatter: '{b}\\n{d}%', fontSize: 12 },
                emphasis: { label: { show: true, fontSize: 16, fontWeight: 'bold', color: '#b8860b' } },
                data: data
            }]
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function initEventTypeChart() {
        const chart = echarts.init(document.getElementById('eventTypeChart'));
        const count = {};
        SANGUO_EVENTS.forEach(e => { count[e.type] = (count[e.type] || 0) + 1; });
        const colors = { '军事': '#e74c3c', '政治': '#9b59b6', '人事': '#3498db' };
        chart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { type: 'value', axisLabel: { color: '#7a7268' }, splitLine: { lineStyle: { color: 'rgba(0,0,0,0.04)' } } },
            yAxis: { type: 'category', data: Object.keys(count), axisLabel: { color: '#3a3530', fontSize: 13 } },
            series: [{
                type: 'bar', barWidth: '50%',
                data: Object.entries(count).map(([k, v]) => ({ value: v, itemStyle: { color: colors[k] || '#c9a227' } })),
                label: { show: true, position: 'right', color: '#3a3530', formatter: '{c}个' }
            }]
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function initTimeline() {
        const chart = echarts.init(document.getElementById('timelineChart'));
        const sorted = [...SANGUO_EVENTS].sort((a, b) => a.year - b.year);
        const typeColors = { '军事': '#c0392b', '政治': '#8e44ad', '人事': '#2980b9' };

        const option = {
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    const d = params.data;
                    if (!d) return '';
                    return `<strong style="color:#b8860b">${d[2]}</strong><br/>
                            <span style="color:#3a3530">${d[0]}年 · ${d[3]}</span><br/>
                            <span style="color:#7a7268;font-size:13px">${d[4]}</span>`;
                }
            },
            grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
            xAxis: {
                type: 'category',
                data: sorted.map(e => e.year),
                axisLabel: { color: '#7a7268', fontSize: 11 },
                axisLine: { lineStyle: { color: 'rgba(184,134,11,0.2)' } },
                splitLine: { show: false }
            },
            yAxis: { show: false, min: -1, max: 1 },
            series: [{
                type: 'scatter',
                symbolSize: 16,
                itemStyle: {
                    color: function(params) {
                        return params.data[5] || '#b8860b';
                    }
                },
                data: sorted.map(e => [e.year, Math.random() * 0.6 - 0.3, e.name, e.type, e.desc, e.color]),
                label: {
                    show: true,
                    position: 'top',
                    color: '#3a3530',
                    fontSize: 11,
                    formatter: function(p) {
                        return p.data[2];
                    }
                },
                emphasis: {
                    itemStyle: { borderColor: '#b8860b', borderWidth: 2 }
                }
            }]
        };
        chart.setOption(option);
        chart.on('click', function(params) {
            if (params.data && params.data[2]) {
                window.open('timeline.html?q=' + encodeURIComponent(params.data[2]), '_blank');
            }
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function goToPage(type, name) {
        const url = type === 'character' ? 'characters.html?q=' + encodeURIComponent(name) : 'timeline.html?q=' + encodeURIComponent(name);
        window.open(url, '_blank');
    }

    function doSearch(e) {
        if (e && e.key !== 'Enter') return;
        const query = document.getElementById('searchInput').value.toLowerCase();
        const typeFilter = document.getElementById('typeFilter').value;
        const factionFilter = document.getElementById('factionFilter').value;
        const results = document.getElementById('searchResults');
        
        let filtered = allSearchData;
        if (query) filtered = filtered.filter(d => d.keywords.some(k => k.includes(query)));
        if (typeFilter !== 'all') filtered = filtered.filter(d => d.type === typeFilter);
        if (factionFilter !== 'all') filtered = filtered.filter(d => d.faction === factionFilter);
        
        if (filtered.length === 0) {
            results.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div>未找到匹配结果</div>';
            return;
        }
        
        results.innerHTML = filtered.slice(0, 20).map(d => `
            <div class="result-item" style="cursor:pointer;" onclick="goToPage('${d.type}', '${d.name.replace(/'/g, "\\'")}')">
                <span class="result-name">${d.name}</span>
                <span class="result-type">${d.label}</span>
            </div>
        `).join('');
        if (filtered.length > 20) {
            results.innerHTML += '<div class="loading">...还有 ' + (filtered.length - 20) + ' 条结果</div>';
        }
    }

    window.onload = function() {
        initData();
        initFactionChart();
        initEventTypeChart();
        initTimeline();
    };
    </script>
</body>
</html>
