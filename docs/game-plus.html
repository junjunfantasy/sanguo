let chars = [];
try { chars = window.SANGUO_CHARACTERS || SANGUO_CHARACTERS || []; } catch(e) { chars = []; }
let factionFilter = 'all';
let team = [];

function setFaction(f, btn) {
  factionFilter = f;
  document.querySelectorAll('.quick-filter button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCards();
}

function filterGameChars() { renderCards(); }

function renderCards() {
  const q = document.getElementById('gsSearch').value.trim().toLowerCase();
  const grid = document.getElementById('gameCardGrid');
  const filtered = chars.filter(c => {
    if (factionFilter !== 'all' && c.faction !== factionFilter) return false;
    if (q && !c.name.toLowerCase().includes(q) && !(c.alias||'').toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('filterCount').textContent = `显示 ${filtered.length} 人`;
  if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>没有找到匹配的武将</div>'; return; }
  
  let html = '';
  filtered.forEach(c => {
    const hp = c.hp || 4;
    const skills = c.skills || [];
    const inTeam = team.some(t => t.name === c.name);
    const f = c.faction||'群';
    
    let skillHtml = '';
    skills.forEach(s => {
      const desc = SD[s] || '—';
      const brief = desc.indexOf('。') >= 0 ? desc.split('。')[0] + '。' : desc.slice(0, 20) + '…';
      skillHtml += `<div class="skill-item"><div class="skill-name" data-skill="${s}" data-char="${c.name}">${s}</div><div class="skill-desc">${brief}</div></div>`;
    });
    
    html += `<div class="game-card ${inTeam?'selected':''}" data-char="${c.name}" style="position:relative;padding-top:24px;">
      <div class="faction-stripe" style="background:${FC[f]}"></div>
      <div class="game-card-header">
        <div>
          <div class="game-card-name">${c.name}</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
            <span class="faction-badge faction-${f}">${f}</span>
            ${c.alias ? '<span style="font-size:12px;color:var(--text-muted)">' + c.alias + '</span>' : ''}
          </div>
        </div>
        <div class="hp-row">${'<span class="hp-dot"></span>'.repeat(hp)}</div>
      </div>
      <div class="game-card-skills">${skillHtml}</div>
    </div>`;
  });
  grid.innerHTML = html;
  
  // 事件委托——点击卡牌切换阵容
  grid.onclick = function(e) {
    const card = e.target.closest('.game-card');
    if (!card) return;
    const name = card.getAttribute('data-char');
    if (name) toggleTeam(name);
  };
  // 事件委托——点击技能名弹出详情
  grid.querySelectorAll('.skill-name').forEach(el => {
    el.onclick = function(e) {
      e.stopPropagation();
      const skill = this.getAttribute('data-skill');
      const char = this.getAttribute('data-char');
      if (skill) showSkill(skill, char);
    };
  });
}

function toggleTeam(name) {
  const idx = team.findIndex(t => t.name === name);
  if (idx >= 0) { team.splice(idx,1); } else { if (team.length >= 5) return; const c = chars.find(x => x.name === name); if (c) team.push(c); }
  renderCards();
  renderTeam();
}

function renderTeam() {
  const slots = document.getElementById('teamSlots');
  let slotHtml = '';
  for (let i = 0; i < 5; i++) {
    const c = team[i];
    if (c) {
      slotHtml += `<div class="team-slot has-character" data-slot="${i}">
        <span class="faction-badge faction-${c.faction||'群'}">${c.faction||'群'}</span>
        <strong>${c.name}</strong>
        <span class="remove-btn" data-slot="${i}">×</span>
      </div>`;
    } else {
      slotHtml += `<div class="team-slot"><span style="color:var(--text-muted)">空位 ${i+1}</span></div>`;
    }
  }
  slots.innerHTML = slotHtml;
  
  // 事件委托——点击移除按钮
  slots.querySelectorAll('.remove-btn').forEach(el => {
    el.onclick = function() {
      const i = parseInt(this.getAttribute('data-slot'));
      team.splice(i,1);
      renderCards();
      renderTeam();
    };
  });
  
  document.getElementById('teamCount').textContent = team.length + '/5';
  document.getElementById('battleBtn').style.display = team.length >= 2 ? 'block' : 'none';
  const stats = document.getElementById('teamStats');
  if (!team.length) { stats.innerHTML = '点击武将卡牌添加到阵容（最多5人）'; return; }
  const factions = [...new Set(team.map(c=>c.faction||'群'))];
  const avgHp = (team.reduce((s,c)=>s+(c.hp||4),0)/team.length).toFixed(1);
  const skillCount = team.reduce((s,c)=>s+(c.skills||[]).length,0);
  const hpStr = team.map(c => c.name + '(' + (c.hp||4) + '❤️)').join(' ');
  stats.innerHTML = `<div>👥 ${team.length}/5</div><div>🏳️ ${factions.join('·')}</div><div>❤️ 均${avgHp} ${hpStr}</div><div>🃏 ${skillCount}技能</div>`;
}

function removeFromTeam(i) { team.splice(i,1); renderCards(); renderTeam(); }

function showSkill(name, fromChar) {
  const desc = SD[name];
  if (!desc) { return; }
  document.getElementById('smName').textContent = name;
  const dotIdx = desc.indexOf('。');
  const effect = dotIdx >= 0 ? desc.substring(0, dotIdx + 1) : desc;
  const history = dotIdx >= 0 ? desc.substring(dotIdx + 1).trim() : '';
  document.getElementById('smEffect').textContent = effect;
  document.getElementById('smHistory').textContent = history || '（技能效果已涵盖历史依据）';
  // 拥有者
  const owners = chars.filter(c => (c.skills||[]).includes(name));
  const ownerEl = document.getElementById('smOwners');
  const currentFaction = owners.find(c => c.name === fromChar)?.faction || '群';
  const badge = document.getElementById('smBadge');
  badge.style.display = 'inline-block';
  badge.className = 'sm-faction-badge faction-' + currentFaction;
  badge.textContent = currentFaction;
  ownerEl.innerHTML = owners.map(o => `<span class="sm-chip" onclick="closeSkill();setTimeout(()=>{document.getElementById('gsSearch').value='${o.name}';filterGameChars();},100)">${o.name}</span>`).join('');
  document.getElementById('skillModal').classList.add('show');
}

function closeSkill() { document.getElementById('skillModal').classList.remove('show'); }
document.getElementById('skillModal').addEventListener('click', function(e) { if (e.target === this) closeSkill(); });

// ===== 对战系统 v2 =====
// 核心属性：武力决定基础伤害，智力决定暴击/闪避，政治决定先手
let _my = [], _en = [];
let battleLog = [];
let round = 1;
let battlePhase = 'idle'; // idle | player_choose | player_skill | enemy_turn | ended
let selectedAttacker = null;
let speedOrder = [];

function calcSpeed(c) {
  // 速度 = 政治*0.4 + 智力*0.3 + 随机(0-5)
  return ((c.mastery?.political || 5) * 0.4 + (c.mastery?.intelligence || 5) * 0.3 + Math.random() * 5);
}

function calcDamage(atk, def, isCrit) {
  const base = (atk.mastery?.strength || 5) * 3 + Math.floor(Math.random() * 10);
  const critMult = isCrit ? 2.0 : 1.0;
  const defReduction = (def.mastery?.strength || 5) * 0.3;
  return Math.max(1, Math.floor(base * critMult - defReduction));
}

function checkCrit(c) {
  // 智力>=8 暴击率30%，智力>=6 15%，其他5%
  const int = c.mastery?.intelligence || 5;
  const rate = int >= 8 ? 0.30 : int >= 6 ? 0.15 : 0.05;
  return Math.random() < rate;
}

function checkDodge(c) {
  // 智力>=9 闪避率25%，智力>=7 12%，其他3%
  const int = c.mastery?.intelligence || 5;
  const rate = int >= 9 ? 0.25 : int >= 7 ? 0.12 : 0.03;
  return Math.random() < rate;
}

function startBattle() {
  if (team.length < 2) return;
  const pool = chars.filter(c => !team.some(t => t.name === c.name));
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const enemy = shuffled.slice(0, Math.min(5, shuffled.length));
  
  const toUnit = c => ({
    ...c, hp: (c.hp || 4) * 20, maxHp: (c.hp || 4) * 20, alive: true,
    speed: calcSpeed(c), usedSkill: false, buffs: [], debuffs: []
  });
  _my = team.map(toUnit);
  _en = enemy.map(toUnit);
  
  battleLog = []; round = 1; battlePhase = 'player_choose';
  addBattleLog('⚔️ 战斗开始！点击我方武将选择攻击目标');
  showBattleModal();
  renderBattleField();
}

function renderBattleField() {
  document.getElementById('battleRound').textContent = `第 ${round} 回合`;
  
  const myDiv = document.getElementById('battleMySide');
  const enDiv = document.getElementById('battleEnSide');
  
  myDiv.innerHTML = _my.map(c => {
    if (!c.alive) return '';
    const hpRatio = c.hp / c.maxHp;
    const hpColor = hpRatio > 0.5 ? 'var(--success)' : hpRatio > 0.25 ? 'var(--orange)' : 'var(--danger)';
    const isSelected = selectedAttacker && selectedAttacker.name === c.name;
    return `<div onclick="selectAttacker('${c.name}')" style="padding:6px 10px;margin-bottom:4px;background:${isSelected ? 'var(--accent-dim)' : 'var(--bg-card)'};border:${isSelected ? '2px solid var(--accent)' : '1px solid var(--border-light)'};border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;transition:all 0.15s;"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${isSelected ? 'var(--accent)' : 'var(--border-light)'}'">
      <span><span style="font-weight:600;color:var(--accent);font-size:13px;">${c.name}</span>
        <span style="font-size:10px;color:var(--text-muted);margin-left:4px;">⚔${c.mastery?.strength||5}🧠${c.mastery?.intelligence||5}👑${c.mastery?.political||5}</span></span>
      <div style="text-align:right;">
        <span style="font-size:11px;color:${hpColor};">❤️${Math.max(0,Math.ceil(c.hp))}/${c.maxHp}</span>

  }).join('') + (!_my.some(c=>c.alive) ? '<div style="color:var(--danger);font-weight:600;padding:8px;text-align:center;">💀 全军覆没</div>' : '');

  enDiv.innerHTML = _en.map(c => {
    if (!c.alive) return '';
    const hpRatio = c.hp / c.maxHp;
    const hpColor = hpRatio > 0.5 ? 'var(--success)' : hpRatio > 0.25 ? 'var(--orange)' : 'var(--danger)';
    const isTarget = selectedAttacker && selectedAttacker.name;
    return `<div onclick="${selectedAttacker ? `playerAttackEnemy('${c.name}')` : ''}" class="enemy-unit" style="padding:6px 10px;margin-bottom:4px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:6px;cursor:${selectedAttacker ? 'pointer' : 'default'};display:flex;justify-content:space-between;transition:all 0.15s;">

      <div style="text-align:right;">
        <span style="font-size:11px;color:${hpColor};">❤️${Math.max(0,Math.ceil(c.hp))}/${c.maxHp}</span>
        <div style="width:60px;height:4px;background:var(--border-light);border-radius:2px;margin-top:2px;margin-left:auto;">
          <div style="width:${Math.max(0,hpRatio*100)}%;height:100%;background:${hpColor};border-radius:2px;transition:width 0.3s;"></div>

    </div>`;
  }).join('') + (!_en.some(c=>c.alive) ? '<div style="color:var(--success);font-weight:600;padding:8px;text-align:center;">🏆 敌方全灭</div>' : '');
  
  updatePhaseLabel();
}

function updatePhaseLabel() {
  const el = document.getElementById('battlePhaseLabel');
  if (!el) return;
  if (battlePhase === 'player_choose') el.textContent = '选择攻击者';
  else if (battlePhase === 'player_target') el.textContent = '选择攻击目标';
  else if (battlePhase === 'enemy_turn') el.textContent = '敌方回合';
  else if (battlePhase === 'ended') el.textContent = '战斗结束';
  else el.textContent = '准备';
}

function addBattleLog(msg) {
  battleLog.push(msg);
  const div = document.getElementById('battleLogDiv');
  if (!div) return;
  div.innerHTML = battleLog.map(l => '<div style="color:var(--text-secondary);padding:2px 0;border-bottom:1px solid var(--border-light);font-size:13px;">' + l + '</div>').join('');
  div.scrollTop = div.scrollHeight;
}

// ===== 玩家操作 =====
function selectAttacker(name) {
  if (battlePhase !== 'player_choose' && battlePhase !== 'player_target') return;
  const c = _my.find(x => x.name === name);
  if (!c || !c.alive) return;
  selectedAttacker = c;
  battlePhase = 'player_target';
  addBattleLog(`🎯 选择 ${c.name} 攻击，点击敌方武将发动攻击`);
  renderBattleField();
}

function playerAttackEnemy(targetName) {
  if (battlePhase !== 'player_target' || !selectedAttacker) return;
  const target = _en.find(c => c.name === targetName);
  if (!target || !target.alive) return;
  
  const atk = selectedAttacker;
  const isCrit = checkCrit(atk);
  const isDodge = checkDodge(target);
  
  let dmg = 0;
  if (!isDodge) {
    dmg = calcDamage(atk, target, isCrit);
    target.hp -= dmg;
  }
  
  let logMsg = `⚔️ ${atk.name} → ${target.name}`;
  if (isDodge) logMsg += ' ❌ 被闪避！';
  else if (isCrit) logMsg += ` 💥 暴击! ${dmg} 点伤害`;
  else logMsg += ` ${dmg} 点伤害`;
  addBattleLog(logMsg);
  
  if (target.hp <= 0) { target.alive = false; target.hp = 0; addBattleLog(`💀 ${target.name} 阵亡！`); }
  
  selectedAttacker = null;
  
  // 检查是否全部行动完毕
  const myAlive = _my.filter(c => c.alive);
  const actionsLeft = myAlive.length;
  
  if (checkBattleOver()) return;
  
  if (actionsLeft > 0) {
    battlePhase = 'player_choose';
    addBattleLog(`👆 还有 ${actionsLeft} 位武将待行动，选择下一位攻击者`);
  } else {
    // 进入敌方回合
    battlePhase = 'enemy_turn';
    addBattleLog('—' + ' 敌方回合 —');
    renderBattleField();
    setTimeout(() => { enemyTurn(); }, 300);
    return;
  }
  renderBattleField();
}

function playerSkip() {
  if (battlePhase === 'ended') return;
  selectedAttacker = null;
  battlePhase = 'enemy_turn';
  addBattleLog(`⏭️ 跳过剩余行动，进入敌方回合`);
  renderBattleField();
  setTimeout(() => { enemyTurn(); }, 300);
}

// ===== 敌方AI =====
function enemyTurn() {
  const enAlive = _en.filter(c => c.alive);
  const myAlive = _my.filter(c => c.alive);
  
  if (!enAlive.length || !myAlive.length) { checkBattleOver(); return; }
  
  // 敌方按速度排序行动
  enAlive.sort((a,b) => b.speed - a.speed);
  
  enAlive.forEach(atk => {
    if (!atk.alive || !myAlive.some(c=>c.alive)) return;
    const targets = _my.filter(c => c.alive);
    // AI策略：优先打血少的
    const target = targets.sort((a,b) => a.hp - b.hp)[0];
    if (!target) return;
    
    const isCrit = checkCrit(atk);
    const isDodge = checkDodge(target);
    let dmg = 0;
    if (!isDodge) {
      dmg = calcDamage(atk, target, isCrit);
      target.hp -= dmg;
    }
    
    let logMsg = `🗡️ ${atk.name} → ${target.name}`;
    if (isDodge) logMsg += ' ❌ 我方闪避！';
    else if (isCrit) logMsg += ` 💥 暴击! ${dmg} 伤害`;
    else logMsg += ` ${dmg} 伤害`;
    addBattleLog(logMsg);
    
    if (target.hp <= 0) { target.alive = false; target.hp = 0; addBattleLog(`💀 ${target.name} 阵亡！`); }
  });
  
  round++;
  if (checkBattleOver()) return;
  
  // 进入玩家回合
  battlePhase = 'player_choose';
  addBattleLog(`— 第 ${round} 回合，选择攻击者 —`);
  renderBattleField();
}

// ===== 战果判定 =====
function checkBattleOver() {
  const myAlive = _my.filter(c => c.alive).length;
  const enAlive = _en.filter(c => c.alive).length;
  
  if (myAlive === 0 && enAlive === 0) addBattleLog('🤝 双方同归于尽！');
  else if (myAlive === 0) addBattleLog('😵 我方全军覆没...');
  else if (enAlive === 0) addBattleLog('🎉 我方获胜！');
  
  if (myAlive === 0 || enAlive === 0) {
    battlePhase = 'ended';
    document.getElementById('btnSkip').disabled = true;
    document.getElementById('btnAuto').disabled = true;
    renderBattleField();
    return true;
  }
  renderBattleField();
  return false;
}

// ===== AI自动 =====
function simulateAll() {
  if (battlePhase === 'ended') return;
  document.getElementById('btnSkip').disabled = true;
  document.getElementById('btnAuto').disabled = true;
  addBattleLog('⏩ AI接管战斗...');
  
  function autoStep() {
    const myAlive = _my.filter(c => c.alive);
    const enAlive = _en.filter(c => c.alive);
    if (!myAlive.length || !enAlive.length) { checkBattleOver(); return; }
    
    // AI自动选择我方武将攻击
    myAlive.sort((a,b) => b.speed - a.speed);
    myAlive.forEach(atk => {
      if (!atk.alive || !_en.some(c=>c.alive)) return;
      const targets = _en.filter(c => c.alive);
      const target = targets.sort((a,b) => a.hp - b.hp)[0];
      if (!target) return;
      
      const isCrit = checkCrit(atk);
      const isDodge = checkDodge(target);
      let dmg = 0;
      if (!isDodge) {
        dmg = calcDamage(atk, target, isCrit);
        target.hp -= dmg;
      }
      
      let logMsg = `⚔️ ${atk.name} → ${target.name}`;
      if (isDodge) logMsg += ' ❌ 被闪避';
      else if (isCrit) logMsg += ` 💥 ${dmg}`;
      else logMsg += ` ${dmg}`;
      addBattleLog(logMsg);
      
      if (target.hp <= 0) { target.alive = false; target.hp = 0; addBattleLog(`💀 ${target.name} 阵亡`); }
    });
    
    if (checkBattleOver()) return;
    
    // 敌方回合
    const enAlive2 = _en.filter(c => c.alive);
    enAlive2.sort((a,b) => b.speed - a.speed);
    enAlive2.forEach(atk => {
      if (!atk.alive || !_my.some(c=>c.alive)) return;
      const targets = _my.filter(c => c.alive);
      const target = targets.sort((a,b) => a.hp - b.hp)[0];
      if (!target) return;
      const isCrit = checkCrit(atk);
      const isDodge = checkDodge(target);
      let dmg = 0;
      if (!isDodge) {
        dmg = calcDamage(atk, target, isCrit);
        target.hp -= dmg;
      }
      let logMsg = `🗡️ ${atk.name} → ${target.name}`;
      if (isDodge) logMsg += ' ❌ 闪避';
      else if (isCrit) logMsg += ` 💥 ${dmg}`;
      else logMsg += ` ${dmg}`;
      addBattleLog(logMsg);
      if (target.hp <= 0) { target.alive = false; target.hp = 0; addBattleLog(`💀 ${target.name} 阵亡`); }
    });
    
    round++;
    if (checkBattleOver()) return;
    
    setTimeout(autoStep, 350);
  }
  
  setTimeout(autoStep, 200);
}

function closeBattle() {
  const el = document.getElementById('battleOverlay');
  if (el) el.remove();
}

// init
document.getElementById('totalCount').textContent = chars.length;
renderCards();
renderTeam();
</script>
