  骁果:'乐进可弃牌视为使用"决斗"。骁勇果敢，先登陷阵',
  先登:'乐进攻击时无视防具。先登破城，冲锋在前',
  强袭:'典韦出牌阶段可弃武器或装备造成伤害。强袭天下，宛城力战护主而死',

  镇军:'王平可弃牌令其他角色弃牌。镇守汉中，严谨持重',
  严整:'王平受到伤害后判定回血。军容严整，一生不败',
  不屈:'严颜濒死时可判定，不为重复则存活。蜀中但有断头将军，无降将军',
  孝义:'关平可代替关羽出杀或出闪。孝义双全，随父殉义',
  护父:'关平可弃牌防止对关羽的伤害。护父麦城，生死与共',

  获缚:'孟获出牌阶段可弃牌限制目标。七擒七纵，终归顺蜀汉',

  飞刀:'祝融夫人可弃牌视为使用"杀"。飞刀断魂，不让须眉',

  智迟:'陈宫跳过出牌阶段后免疫"杀"。智迟一步，白门楼殉义',
  自守:'刘表出牌阶段可弃牌摸牌。自守荆州，坐拥荆襄九郡',
  宗室:'刘表受到伤害后可判定回血。汉室宗亲，名士风流'
};

let chars = window.SANGUO_CHARACTERS || [];
let factionFilter = 'all';
let team = [];

function setFaction(f, btn) {
  factionFilter = f;
  document.querySelectorAll('.quick-filter button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCards();
}

function filterGameChars() { renderCards(); }

function renderCards() {
  const q = document.getElementById('gsSearch').value.trim().toLowerCase();
  const grid = document.getElementById('gameCardGrid');
  const filtered = chars.filter(c => {
    if (factionFilter !== 'all' && c.faction !== factionFilter) return false;
    if (q && !c.name.includes(q) && !(c.alias||'').toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('filterCount').textContent = `显示 ${filtered.length} 人`;
  if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>没有找到匹配的武将</div>'; return; }
  grid.innerHTML = filtered.map(c => {
    const hp = c.hp || 4;
    const skills = c.skills || [];
    const inTeam = team.some(t => t.name === c.name);
    const f = c.faction||'群';
    return `<div class="game-card ${inTeam?'selected':''}" onclick="toggleTeam('${c.name}')" style="position:relative;padding-top:24px;">
      <div class="faction-stripe" style="background:${FC[f]}"></div>
      <div class="game-card-header">
        <div>
          <div class="game-card-name">${c.name}</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
            <span class="faction-badge faction-${f}">${f}</span>
            ${c.alias ? '<span style="font-size:12px;color:var(--text-muted)">' + c.alias + '</span>' : ''}
          </div>
        </div>
        <div class="hp-row">${'<span class="hp-dot"></span>'.repeat(hp)}</div>
      </div>
      <div class="game-card-skills">${skills.map(s => {
        const desc = SD[s] || '—';
        return `<div class="skill-item"><div class="skill-name" onclick="event.stopPropagation();showSkill('${s}','${c.name}')">${s}</div><div class="skill-desc">${desc.split('。')[0]}。</div></div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function toggleTeam(name) {
  const idx = team.findIndex(t => t.name === name);
  if (idx >= 0) { team.splice(idx,1); } else { if (team.length >= 5) return; const c = chars.find(x => x.name === name); if (c) team.push(c); }
  renderCards();
  renderTeam();
}

function renderTeam() {
  const slots = document.getElementById('teamSlots');
  slots.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const c = team[i];
    slots.innerHTML += `<div class="team-slot ${c?'has-character':''}">${c ? `<span class="faction-badge faction-${c.faction||'群'}">${c.faction||'群'}</span> <strong>${c.name}</strong> <span class="remove-btn" onclick="removeFromTeam(${i})">×</span>` : '<span style="color:var(--text-muted)">空位 ' + (i+1) + '</span>'}</div>`;
  }
  document.getElementById('teamCount').textContent = team.length + '/5';
  const stats = document.getElementById('teamStats');
  if (!team.length) { stats.innerHTML = '点击武将卡牌添加到阵容（最多5人）'; return; }
  const factions = [...new Set(team.map(c=>c.faction||'群'))];
  const avgHp = (team.reduce((s,c)=>s+(c.hp||4),0)/team.length).toFixed(1);
  const skillCount = team.reduce((s,c)=>s+(c.skills||[]).length,0);
  const hpStr = team.map(c => c.name + '(' + (c.hp||4) + '❤️)').join(' ');
  stats.innerHTML = `<div>👥 ${team.length}/5</div><div>🏳️ ${factions.join('·')}</div><div>❤️ 均${avgHp} ${hpStr}</div><div>🃏 ${skillCount}技能</div>`;
}

function removeFromTeam(i) { team.splice(i,1); renderCards(); renderTeam(); }

function showSkill(name, fromChar) {
  const desc = SD[name];
  if (!desc) { return; }
  document.getElementById('smName').textContent = name;
  const dotIdx = desc.indexOf('。');
  const effect = dotIdx >= 0 ? desc.substring(0, dotIdx + 1) : desc;
  const history = dotIdx >= 0 ? desc.substring(dotIdx + 1).trim() : '';
  document.getElementById('smEffect').textContent = effect;
  document.getElementById('smHistory').textContent = history || '（技能效果已涵盖历史依据）';
  // 拥有者
  const owners = chars.filter(c => (c.skills||[]).includes(name));
  const ownerEl = document.getElementById('smOwners');
  const currentFaction = owners.find(c => c.name === fromChar)?.faction || '群';
  const badge = document.getElementById('smBadge');
  badge.style.display = 'inline-block';
  badge.className = 'sm-faction-badge faction-' + currentFaction;
  badge.textContent = currentFaction;
  ownerEl.innerHTML = owners.map(o => `<span class="sm-chip" onclick="closeSkill();setTimeout(()=>{document.getElementById('gsSearch').value='${o.name}';filterGameChars();},100)">${o.name}</span>`).join('');
  document.getElementById('skillModal').classList.add('show');
}

function closeSkill() { document.getElementById('skillModal').classList.remove('show'); }
document.getElementById('skillModal').addEventListener('click', function(e) { if (e.target === this) closeSkill(); });

// init
document.getElementById('totalCount').textContent = chars.length;
renderCards();
renderTeam();
</script>
</body>
